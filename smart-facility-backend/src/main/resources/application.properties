spring.application.name=smart-facility-backend

# ===================== DATABASE =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_facility_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===================== SERVER =====================
server.port=8080
server.error.include-message=always

# ===================== JWT =====================
# 256-bit (or longer) base64 secret - replace in production via env var
jwt.secret=${JWT_SECRET:c21hcnRmYWNpbGl0eW1hbmFnZW1lbnRzeXN0ZW1zZWNyZXRrZXlmb3Jqd3QtMjAyNA==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===================== CLOUDINARY =====================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

# ===================== FILE UPLOAD =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===================== CORS =====================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}

# ===================== ADMIN SEED =====================
app.admin.default-email=${DEFAULT_ADMIN_EMAIL:admin@gmail.com}
app.admin.default-password=${DEFAULT_ADMIN_PASSWORD:admin@123}
app.admin.default-name=${DEFAULT_ADMIN_NAME:System Administrator}

# ===================== LOGGING ========================
logging.level.org.springframework.security=INFO
logging.level.com.example.smartfacility=DEBUG
